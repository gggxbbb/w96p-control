<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" fill="none" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fan-grad" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="fan-grad2" x1="384" y1="128" x2="128" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#1A1A18"/>
  <!-- fan blades -->
  <g transform="translate(256,256)">
    <!-- blade 1 -->
    <path d="M0,0 C30,-20 60,-80 40,-140 C70,-140 110,-120 130,-90 C130,-50 90,-20 0,0Z" fill="url(#fan-grad)" opacity="0.9"/>
    <!-- blade 2 -->
    <path d="M0,0 C20,-30 80,-60 140,-40 C140,-70 120,-110 90,-130 C50,-130 20,-90 0,0Z" fill="url(#fan-grad2)" opacity="0.9" transform="rotate(120)"/>
    <!-- blade 3 -->
    <path d="M0,0 C30,-20 60,-80 40,-140 C70,-140 110,-120 130,-90 C130,-50 90,-20 0,0Z" fill="url(#fan-grad)" opacity="0.9" transform="rotate(240)"/>
    <!-- center hub -->
    <circle r="32" fill="#1A1A18"/>
    <circle r="24" fill="url(#fan-grad)"/>
    <circle r="10" fill="#1A1A18"/>
  </g>
  <!-- wind lines -->
  <g stroke="#06B6D4" stroke-width="6" stroke-linecap="round" opacity="0.3">
    <path d="M380,160 Q420,150 460,160"/>
    <path d="M370,180 Q420,170 470,185"/>
    <path d="M375,200 Q410,195 440,205"/>
  </g>
</svg>
